{% extends 'layout.html' %}

{% block title %}
    Start Game
{% endblock %}

{% block content %}
<!-- This inline CSS block forces Django to render the styles immediately -->
<style>
    /* 1. Turn the form into a 3-column grid layout */
    form {
        max-width: 1200px; /* Widened to comfortably hold 3 columns side-by-side */
        margin: 0 auto !important;
        padding: 20px;
        
        display: grid !important;
        grid-template-columns: repeat(3, 1fr); /* 3 equal-width columns */
        column-gap: 30px;  /* Space between columns */
        row-gap: 20px;     /* Space between rows */
    }

    /* 2. Style the paragraph containers generated by Django */
    form p {
        margin: 0 !important;
        text-align: center;
        width: 100%;
    }

    /* 3. Force the 3 Player Names to stay at the top and stretch across */
    /* Targets the first 3 paragraphs (Player Names) and makes them span all 3 columns */
    form p:nth-of-type(1),
    form p:nth-of-type(2),
    form p:nth-of-type(3) {
        grid-column: 1 / span 3; 
    }

    /* 4. Style all text boxes and dropdown menus */
    form p input[type="text"], 
    form p select {
        width: 100% !important;
        max-width: 320px; /* Keeps the boxes short and clean */
        margin: 8px auto 0 auto !important;
        display: block !important;
        box-sizing: border-box !important;
        padding: 10px;
    }

    /* 5. Hide the CSRF hidden token field so it doesn't break the grid alignment */
    form input[type="hidden"] {
        display: none !important;
    }

    /* 6. Center the Submit button at the very bottom */
    form button[type="submit"] {
        grid-column: 1 / span 3; /* Spans all 3 columns to center itself */
        margin: 30px auto 0 auto !important;
        padding: 12px 40px;
        max-width: 250px;
        cursor: pointer;
    }
</style>  

<form method="post"> 
    {% csrf_token %} 
    {{ form.as_p }} 
    <button type="submit">Submit for Display</button> 
</form> 
{% endblock %}
