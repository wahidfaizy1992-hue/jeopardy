<div id="clue-modal" style="display:none;" class="modal">
    <div class="modal-content">
        <h2 id="modal-value"></h2>
        <p id="modal-text">Loading...</p>
        <p id="modal-answer"> </p>
        <button onclick="showAnswer()">Show Answer</button>
        <button onclick="closeModal()">Close</button>
    </div>
</div>


</main>
<script>
    function showModal() {
        const modal = document.getElementById("clue-modal");
        document.getElementById("modal-text").innerText="He was a famous cartoon bunny";
        document.getElementById("modal-value").innerText="$100";
        document.getElementById("modal-answer").innerText="";
        modal.style.display="block";
    }

    function closeModal() {
        document.getElementById("clue-modal").style.display = "none";
    }

    function showAnswer() {
        document.getElementById("modal-answer").innerText = "Who is Bugs Bunny?";
    }

</script>
